<!doctype html>
<html lang="en">

<head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Connect 4 – 3D Space Edition</title>
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="style.css">
</head>

<body>

      <!-- Animated space background -->
      <canvas id="starfield"></canvas>

      <!-- Main scene -->
      <div class="scene">

            <!-- HUD header -->
            <header class="hud">
                  <h1 class="game-title">CONNECT <span class="accent">4</span></h1>
                  <div class="status-bar">
                        <div class="player-card" id="p1card">
                              <div class="chip-dot p1-dot"></div>
                              <div class="player-details">
                                    <span class="player-label">PLAYER 1</span>
                                    <span class="player-name" id="p1name">—</span>
                              </div>
                              <span class="score" id="p1score">0</span>
                        </div>
                        <div class="vs-sep">VS</div>
                        <div class="player-card" id="p2card">
                              <span class="score" id="p2score">0</span>
                              <div class="player-details right">
                                    <span class="player-label">PLAYER 2</span>
                                    <span class="player-name" id="p2name">—</span>
                              </div>
                              <div class="chip-dot p2-dot"></div>
                        </div>
                  </div>
                  <p class="turn-display" id="turnDisplay">Click a column to begin</p>
            </header>

            <!-- 3D board -->
            <div class="board-scene">
                  <div class="board-wrapper" id="boardWrapper">
                        <table id="connectFourBoard" class="board">
                              <tbody>
                                    <tr>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                    </tr>
                                    <tr>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                    </tr>
                                    <tr>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                    </tr>
                                    <tr>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                    </tr>
                                    <tr>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                    </tr>
                                    <tr>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                          <td><button type="button"></button></td>
                                    </tr>
                              </tbody>
                        </table>
                  </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                  <button class="ctrl-btn rotate-btn" id="rotateLeft">&#9664; Rotate</button>
                  <button class="ctrl-btn new-game-btn" id="reloadGame">&#8634; New Game</button>
                  <button class="ctrl-btn rotate-btn" id="rotateRight">Rotate &#9654;</button>
            </div>

            <p class="hint-text">Drag the board to rotate &bull; Click any column to drop a chip</p>

      </div>

      <!-- Win overlay -->
      <div class="win-overlay hidden" id="winOverlay">
            <div class="win-panel">
                  <div class="trophy-icon">&#127942;</div>
                  <div class="win-title">VICTORY!</div>
                  <div class="win-player-name" id="winPlayerName"></div>
                  <button class="ctrl-btn new-game-btn" id="winReload">Play Again</button>
            </div>
      </div>

      <!-- Tie overlay -->
      <div class="win-overlay hidden" id="tieOverlay">
            <div class="win-panel tie-panel">
                  <div class="trophy-icon">&#129306;</div>
                  <div class="win-title tie-title">DRAW!</div>
                  <div class="win-player-name">Nobody wins this round</div>
                  <button class="ctrl-btn new-game-btn" id="tieReload">Play Again</button>
            </div>
      </div>

      <!-- Particle FX container -->
      <div id="pfx"></div>

      <script src="https://code.jquery.com/jquery-3.6.3.js"
            integrity="sha256-nQLuAZGRRcILA+6dMBOvcRh5Pe310sBpanc6+QBmyVM=" crossorigin="anonymous"></script>
      <script src="script.js"></script>

</body>

</html>
